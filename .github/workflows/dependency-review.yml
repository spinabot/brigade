name: Dependency Review

# On every PR, review dependency changes and fail if a newly-introduced
# dependency carries a known high-severity (or worse) vulnerability, or a
# disallowed license. Complements OSV-Scanner (which covers already-merged deps).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
